name: Deploy to Firebase Hosting on Push

on:
  push:
    branches:
      - main
      - master # Triggers on either main or master

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # or '18' depending on your preference
          cache: 'npm'
          cache-dependency-path: './client/package-lock.json'

      - name: Install Frontend Dependencies
        working-directory: ./client
        run: npm ci

      - name: Build Frontend
        working-directory: ./client
        run: npm run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_PERSONAL_PROJECTS_BFCF0 }}'
          channelId: live
          projectId: personal-projects-bfcf0
